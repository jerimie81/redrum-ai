name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint and type check
        run: |
          flake8 src tests || echo "flake8 failed, ignoring for now"
          black --check src tests || echo "black failed, ignoring for now"
          mypy src || echo "mypy failed, ignoring for now"

      - name: Run pytest
        env:
          REDRUM_AI_DB_PATH: ${{ github.workspace }}/tests/ci_memory.db
          REDRUM_AI_MODEL_PROVIDER: local
        run: |
          pytest tests/ --cov=src/redrum_ai --cov-report=xml

